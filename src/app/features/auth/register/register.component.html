<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">Lumi</span>
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start your learning journey today.</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-field">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Your name" />
      </div>

      <div class="form-field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
      </div>

      <div class="form-field">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="At least 6 characters" />
      </div>

      <div class="form-field">
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Re-enter password" />
      </div>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      <button type="submit" class="submit-btn">
        Create Account <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>

  <div class="auth-decoration">
    <div class="blob-glow"></div>
  </div>
</div>
